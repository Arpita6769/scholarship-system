<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class = "dashboard-conatiner">
  <button id="logoutBtn">Logout 🚪</button>
  <hr/>

  <h2>Create Scholarship 🎓</h2>

  <form id="createScholarshipForm">
    <input type="text" id="title" placeholder="Title" required /><br/><br/>
    <input type="text" id="description" placeholder="Description" required /><br/><br/>
    <input type="number" id="amount" placeholder="Amount" required /><br/><br/>
    <input type="number" id="min_cgpa" placeholder="Minimum CGPA" required /><br/><br/>
    <input type="number" id="max_income" placeholder="Maximum Family Income" required /><br/><br/>
    <input type="number" id="seats" placeholder="Number of Seats" required /><br/><br/>
    <input type="date"id = "deadline"placeholder="Deadline" required/><br></br>
    <button type="submit">Create</button>
  </form>

  <hr/>

  <h2>All Applications 📋</h2>
  <div id="applicationsList"></div>
</div>
  <script src="script.js"></script>
</body>
</html>
